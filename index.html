<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./index.css" />
  </head>
  <body>
    <header>
      <img src="./images/logo.svg" alt="Base Apparel logo" />
    </header>
    <main>
      <section class="hero">
        <div class="hero__image">
          <picture>
            <source
              media="(min-width: 64rem)"
              srcset="./images/hero-desktop.jpg"
            />
            <img
              src="./images/hero-mobile.jpg"
              alt="woman in a button down with a bracelet on"
            />
          </picture>
        </div>
        <div class="hero__content">
          <div class="hero__text">
            <h1 class="test"><span class="topper">We're</span> coming soon</h1>
            <p>
              Hello fellow shoppers! We're currently building our new fashion
              store. Add your email below to stay up-to-date with announcements
              and our launch deals.
            </p>
          </div>
          <div class="hero__form">
            <form id="newsletter-sign-up-form">
              <div class="form-row">
                <input
                  type="email"
                  autocomplete="email"
                  id="email"
                  name="email"
                  placeholder="Email Address"
                  required
                />
                <button type="submit" aria-label="form submit button">
                  <img src="/images/icon-arrow.svg" alt="arrow icon" />
                </button>
                <div class="error-message">
                  Please provide a valid email address
                </div>
                <div class="error-icon">
                  <img src="./images/icon-error.svg" alt="" />
                </div>
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
